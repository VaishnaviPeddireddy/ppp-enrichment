name: PPP chunk (manual)

# Legacy one-chunk runner. Scheduled processing uses pipeline.yml (every 3 hours UTC).

on:
  workflow_dispatch:

concurrency:
  group: scheduled-ppp-enrichment
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  process-one-chunk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Process one chunk (scrapes web; may fail — chunk is kept)
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/ci_process_one_chunk.py

      - name: Commit clean results & chunk removal
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -u -- data/input/
          git add -- clean_github_results/

          if git diff --quiet && git diff --cached --quiet; then
            echo "Nothing to commit (no chunk processed or no file changes)."
            exit 0
          fi

          git commit -m "chore(ci): PPP chunk processed → clean leads"
          git push origin "HEAD:${{ github.ref_name }}"
