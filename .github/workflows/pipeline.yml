name: PPP Enrichment Pipeline

on:
  schedule:
    - cron: "0 */3 * * *"   # runs every 3 hours (00:00, 03:00, 06:00, 09:00, 12:00, 15:00, 18:00, 21:00 UTC)
  workflow_dispatch:          # allows manual trigger from GitHub Actions UI

permissions:
  contents: write             # required to commit output files and delete chunks

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # 5h50m — GitHub kills at 6h, this exits cleanly at 5h50m

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore PPP queue cache
        uses: actions/cache/restore@v4
        id: queue-cache
        with:
          path: data/input/queue
          key: ppp-queue-${{ github.ref_name }}
          restore-keys: |
            ppp-queue-${{ github.ref_name }}

      - name: Bootstrap queue from dataset URL (first run only)
        env:
          PPP_DATASET_URL: ${{ secrets.PPP_DATASET_URL }}
        run: |
          COUNT=$(find data/input/queue -name 'ppp-war_part*.csv' 2>/dev/null | wc -l)
          if [ "$COUNT" -eq "0" ] && [ -n "$PPP_DATASET_URL" ]; then
            echo "Queue empty — downloading PPP dataset and splitting into chunks..."
            mkdir -p data/input/queue
            curl -fsSL -o data/input/ppp-war.csv "$PPP_DATASET_URL"
            python -m src.ppp_enrichment.run_split_ppp_csv \
              --path data/input/ppp-war.csv \
              --rows 2000 \
              --out-dir data/input/queue
            rm -f data/input/ppp-war.csv
            echo "Bootstrap complete: $(find data/input/queue -name 'ppp-war_part*.csv' | wc -l) chunk(s)."
          elif [ "$COUNT" -eq "0" ]; then
            echo "::warning::Queue empty and PPP_DATASET_URL secret not set. Add repo secret or seed cache manually."
          fi

      - name: Check queue is not empty
        id: check_queue
        run: |
          COUNT=$(ls data/input/queue/*.csv 2>/dev/null | wc -l)
          echo "chunks_available=$COUNT" >> $GITHUB_OUTPUT
          if [ "$COUNT" -eq "0" ]; then
            echo "::warning::Queue is empty. No chunk files found in data/input/queue/"
          else
            echo "Found $COUNT chunk(s) in queue."
          fi

      - name: Run pipeline (500 leads)
        if: steps.check_queue.outputs.chunks_available != '0'
        env:
          DDG_BACKENDS: duckduckgo,google,yahoo
          DOMAIN_LEAD_TIME_LIMIT_SECONDS: "20"
        run: python -m src.ppp_enrichment.run_pipeline --leads 500 --oversample-factor 5

      - name: Commit clean output back to repo
        if: steps.check_queue.outputs.chunks_available != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/output/clean_leads_*.csv
          git add clean_github_results/ 2>/dev/null || true
          git diff --staged --quiet || git commit -m "pipeline: $(date +'%Y-%m-%d %H:%M UTC') — clean leads"
          git push

      - name: Save PPP queue cache
        if: steps.check_queue.outputs.chunks_available != '0'
        uses: actions/cache/save@v4
        with:
          path: data/input/queue
          key: ppp-queue-${{ github.ref_name }}
